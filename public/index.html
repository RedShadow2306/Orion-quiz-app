<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Stars background */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.2), transparent);
            top: -150px; left: -150px;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.2), transparent);
            bottom: -100px; right: -100px;
            animation-delay: 3s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .container {
            text-align: center;
            color: white;
            padding: 40px;
            z-index: 1;
        }

        .logo {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(90deg, #818cf8, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .tagline {
            font-size: 1.1rem;
            opacity: 0.5;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 45px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 15px 25px;
            min-width: 120px;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #a78bfa;
        }
        .stat-label {
            font-size: 0.75rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .btn {
            padding: 18px 50px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .btn-host {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn-host:hover {
            box-shadow: 0 15px 40px rgba(99,102,241,0.4);
        }
        .btn-join {
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .btn-join:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.5);
        }

        .features {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .feature {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 15px;
            padding: 18px 20px;
            width: 150px;
            transition: all 0.3s;
        }
        .feature:hover {
            background: rgba(255,255,255,0.07);
            transform: translateY(-5px);
        }
        .feature-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .feature-text { font-size: 0.8rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <!-- Twinkling stars -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="logo">⭐</div>
        <h1>ORION</h1>
        <p class="tagline">Live Quizzes · Real Responses · Real Time</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-number">3</div>
                <div class="stat-label">Question Types</div>
            </div>
            <div class="stat">
                <div class="stat-number">∞</div>
                <div class="stat-label">Players</div>
            </div>
            <div class="stat">
                <div class="stat-number">Live</div>
                <div class="stat-label">Leaderboard</div>
            </div>
        </div>

        <div class="buttons">
            <a href="host.html" class="btn btn-host">🏠 Host a Quiz</a>
            <a href="join.html" class="btn btn-join">🎮 Join a Quiz</a>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Real-time</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🏆</div>
                <div class="feature-text">Leaderboard</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">MCQ & Poll</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔗</div>
                <div class="feature-text">Join by Code</div>
            </div>
        </div>
    </div>

    <script>
        // Generate twinkling stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
